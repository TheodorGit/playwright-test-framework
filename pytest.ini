[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Output configuration
addopts = -v --tb=short

# Custom markers for test categorization
markers =
    smoke: critical-path checks, fast enough for every commit
    regression: full functional coverage, run before every release
    functional: UI functional tests
    e2e: end-to-end user workflows
    api: HTTP API tests (no browser required)
    defect: known-bug detection against deliberately broken builds (xfail)
